name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: local_user
          POSTGRES_PASSWORD: local_password
          POSTGRES_DB: local_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U local_user -d local_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/hydrogen"

      - name: Install dependencies
        run: npm ci

      - name: Run tests (CI safe)
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://local_user:local_password@localhost:5432/local_db
          NODE_ENV: test

      - name: Build project
        run: npm run build
